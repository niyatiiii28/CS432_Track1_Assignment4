{% extends "base.html" %}
{% block title %}Trips – ShuttleGo{% endblock %}

{% block content %}
<div class="topbar">
  <h1>🗺️ Trips</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <select class="form-control" id="filterStatus" onchange="loadTrips()" style="width:150px">
      <option value="">All Status</option>
      <option>Scheduled</option><option>InProgress</option>
      <option>Completed</option><option>Cancelled</option>
    </select>
    <input type="date" class="form-control" id="filterDate" onchange="loadTrips()" style="width:160px">
  </div>
</div>
<div class="content">
  <div class="card">
    <div id="tripsTable"><div class="text-muted">Loading…</div></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="tripModal">
  <div class="modal" style="width:min(600px,95vw)">
    <div class="modal-title">🗺️ Trip Detail</div>
    <div id="tripDetail"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('tripModal').classList.remove('open')">Close</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadTrips() {
  const status = document.getElementById('filterStatus').value;
  const date   = document.getElementById('filterDate').value;
  let url = '/api/trips?';
  if (status) url += `status=${status}&`;
  if (date)   url += `date=${date}&`;

  document.getElementById('tripsTable').innerHTML = '<div class="text-muted">Loading…</div>';
  const trips = await apiFetch(url).catch(()=>[]);
  renderTrips(trips);
}

function renderTrips(data) {
  if (!data.length) {
    document.getElementById('tripsTable').innerHTML = '<div class="text-muted">No trips found.</div>';
    return;
  }
  document.getElementById('tripsTable').innerHTML = `
    <table>
      <thead><tr>
        <th>ID</th><th>Route</th><th>Date</th><th>Departure</th>
        <th>Driver</th><th>Vehicle</th><th>Seats</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>
        ${data.map(t=>`<tr>
          <td>#${t.TripID}</td>
          <td>${t.RouteName||t.Source+' → '+t.Destination}</td>
          <td>${t.TripDate}</td>
          <td>${t.ScheduledDepartureTime}</td>
          <td>${t.DriverName||'—'}</td>
          <td>${t.VehicleNumber||'—'}</td>
          <td>${t.AvailableSeats}/${t.TotalSeats}</td>
          <td>${statusTag(t.Status_)}</td>
          <td><button class="btn btn-outline btn-sm" onclick="viewTrip(${t.TripID})">👁</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function viewTrip(id) {
  document.getElementById('tripDetail').innerHTML = '<div class="text-muted">Loading…</div>';
  document.getElementById('tripModal').classList.add('open');
  const t = await apiFetch(`/api/trips/${id}`).catch(e => { return null; });
  if (!t) { document.getElementById('tripDetail').innerHTML = '<div class="alert alert-error">Failed to load</div>'; return; }
  document.getElementById('tripDetail').innerHTML = `
    <div class="grid-2" style="gap:12px;font-size:.88rem">
      <div><span class="text-muted">Route</span><br><strong>${t.RouteName}</strong></div>
      <div><span class="text-muted">Status</span><br>${statusTag(t.Status_)}</div>
      <div><span class="text-muted">From → To</span><br>${t.Source} → ${t.Destination}</div>
      <div><span class="text-muted">Date</span><br>${t.TripDate}</div>
      <div><span class="text-muted">Scheduled</span><br>${t.ScheduledDepartureTime} – ${t.ScheduledArrivalTime}</div>
      <div><span class="text-muted">Actual</span><br>${t.ActualDepartureTime||'—'} – ${t.ActualArrivalTime||'—'}</div>
      <div><span class="text-muted">Driver</span><br>${t.DriverName} (⭐${t.DriverRating})</div>
      <div><span class="text-muted">Vehicle</span><br>${t.VehicleNumber} · ${t.Model} · ${t.Capacity} seats</div>
      <div><span class="text-muted">Available Seats</span><br>${t.AvailableSeats} / ${t.TotalSeats}</div>
      <div><span class="text-muted">Base Fare</span><br>₹${t.BaseFare}</div>
    </div>`;
}

function statusTag(s) {
  const m={InProgress:'blue',Scheduled:'yellow',Completed:'green',Cancelled:'red'};
  return `<span class="tag tag-${m[s]||'gray'}">${s}</span>`;
}

loadTrips();
document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
loadTrips();
document.querySelector('.modal-overlay').addEventListener('click', e => {
  if(e.target===e.currentTarget) e.currentTarget.classList.remove('open');
});
</script>
{% endblock %}
