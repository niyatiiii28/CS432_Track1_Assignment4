<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ShuttleGo{% endblock %}</title>
  <style>
    :root {
      --primary: #1a56db; --primary-dark: #1e429f;
      --accent: #ff6b35; --bg: #f0f4ff;
      --sidebar-w: 220px; --card: #fff;
      --success: #0e9f6e; --danger: #e02424; --warn: #e3a008;
      --text: #1f2937; --muted: #6b7280; --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* Sidebar */
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: var(--sidebar-w); background: var(--primary-dark);
      display: flex; flex-direction: column; padding: 0;
      z-index: 100; box-shadow: 2px 0 8px rgba(0,0,0,.2);
    }
    .sidebar-logo {
      background: var(--primary); padding: 20px 16px;
      font-size: 1.25rem; font-weight: 700; color: #fff;
      letter-spacing: .5px;
    }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-user {
      padding: 14px 16px 10px; border-bottom: 1px solid rgba(255,255,255,.1);
      font-size: .8rem; color: rgba(255,255,255,.65);
    }
    .sidebar-user strong { color: #fff; display: block; font-size: .95rem; }
    .sidebar-user .badge {
      display: inline-block; margin-top: 4px; padding: 2px 8px;
      border-radius: 20px; font-size: .7rem; font-weight: 600; text-transform: uppercase;
    }
    .badge-admin { background: var(--accent); color: #fff; }
    .badge-user  { background: rgba(255,255,255,.15); color: #fff; }
    .sidebar nav { flex: 1; padding: 10px 0; overflow-y: auto; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; color: rgba(255,255,255,.75);
      text-decoration: none; font-size: .9rem;
      transition: all .15s; border-left: 3px solid transparent;
    }
    .sidebar nav a:hover, .sidebar nav a.active {
      background: rgba(255,255,255,.08); color: #fff;
      border-left-color: var(--accent);
    }
    .sidebar nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .sidebar-footer {
      padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.1);
    }
    .btn-logout {
      width: 100%; padding: 9px; background: rgba(255,255,255,.08);
      color: #fff; border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px; cursor: pointer; font-size: .85rem;
      transition: background .15s;
    }
    .btn-logout:hover { background: var(--danger); }

    /* Main content */
    .main { margin-left: var(--sidebar-w); min-height: 100vh; }
    .topbar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 50;
    }
    .topbar h1 { font-size: 1.15rem; font-weight: 600; }
    .content { padding: 28px; }

    /* Cards */
    .card {
      background: var(--card); border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07); padding: 20px;
      border: 1px solid var(--border);
    }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 14px; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { background: #f9fafb; padding: 10px 12px; text-align: left;
         font-weight: 600; border-bottom: 2px solid var(--border); color: var(--muted); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 7px; cursor: pointer;
      font-size: .85rem; font-weight: 500; border: none; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover { filter: brightness(.9); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { filter: brightness(.9); }
    .btn-warn    { background: var(--warn); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: .78rem; }
    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: #f3f4f6; }

    /* Badges */
    .tag {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: .72rem; font-weight: 600; text-transform: uppercase;
    }
    .tag-green  { background: #d1fae5; color: #065f46; }
    .tag-red    { background: #fee2e2; color: #991b1b; }
    .tag-blue   { background: #dbeafe; color: #1e40af; }
    .tag-yellow { background: #fef3c7; color: #92400e; }
    .tag-gray   { background: #f3f4f6; color: #374151; }
    .tag-purple { background: #ede9fe; color: #5b21b6; }

    /* Grid helpers */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

    /* Stat cards */
    .stat-card {
      background: var(--card); border-radius: 10px; padding: 18px 20px;
      border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .stat-card .label { font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-card .sub   { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 5px; }
    .form-control {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 7px; font-size: .875rem; outline: none;
      transition: border-color .15s;
    }
    .form-control:focus { border-color: var(--primary); }

    /* Alert */
    .alert {
      padding: 10px 14px; border-radius: 7px; font-size: .85rem;
      margin-bottom: 14px;
    }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert-info    { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 28px;
      width: min(500px, 90vw); max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }
    .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

    /* Toast */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 9999;
    }
    .toast {
      padding: 12px 18px; border-radius: 8px; font-size: .85rem;
      color: #fff; min-width: 200px; animation: slideIn .2s ease;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }
    .toast-success { background: var(--success); }
    .toast-error   { background: var(--danger); }
    .toast-info    { background: var(--primary); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* Spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Misc */
    .separator { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .text-muted { color: var(--muted); font-size: .82rem; }
    .mb-4 { margin-bottom: 16px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-2 { gap: 8px; }
    pre { background: #1f2937; color: #e5e7eb; padding: 14px; border-radius: 8px;
          font-size: .78rem; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
{% if session %}
<aside class="sidebar">
  <div class="sidebar-logo">🚌 Shuttle<span>Go</span></div>
  <div class="sidebar-user">
    <strong>{{ username }}</strong>
    <span class="badge badge-{{ role }}">{{ role }}</span>
  </div>
  <nav>
    <a href="/dashboard" class="{% if request.path=='/dashboard' %}active{% endif %}">
      <span class="icon">🏠</span> Dashboard
    </a>
    <a href="/members" class="{% if request.path=='/members' %}active{% endif %}">
      <span class="icon">👥</span> Members
    </a>
    <a href="/trips" class="{% if request.path=='/trips' %}active{% endif %}">
      <span class="icon">🗺️</span> Trips
    </a>
    <a href="/bookings" class="{% if request.path=='/bookings' %}active{% endif %}">
      <span class="icon">🎫</span> Bookings
    </a>
    <a href="/benchmark" class="{% if request.path=='/benchmark' %}active{% endif %}">
      <span class="icon">⚡</span> Benchmark
    </a>
    {% if role == 'admin' %}
    <a href="/admin" class="{% if request.path=='/admin' %}active{% endif %}">
      <span class="icon">🔧</span> Admin Panel
    </a>
    <a href="/logs" class="{% if request.path=='/logs' %}active{% endif %}">
      <span class="icon">📋</span> Audit Logs
    </a>
    {% endif %}
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">⬅ Logout</button>
  </div>
</aside>
{% endif %}

<main class="main">
  {% block content %}{% endblock %}
</main>

<div id="toast-container"></div>

<script>
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function apiFetch(url, opts={}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
