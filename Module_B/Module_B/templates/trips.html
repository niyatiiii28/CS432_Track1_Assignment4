{% extends "base.html" %}
{% block title %}Trips – ShuttleGo{% endblock %}

{% block content %}
<div class="topbar">
  <h1>🗺️ Trips</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <select class="form-control" id="filterStatus" onchange="loadTrips()" style="width:150px">
      <option value="">All Status</option>
      <option>Scheduled</option>
      <option>InProgress</option>
      <option>Completed</option>
      <option>Cancelled</option>
    </select>
    <input type="date" class="form-control" id="filterDate" onchange="loadTrips()" style="width:160px">
  </div>
</div>

<div class="content">
  <div class="card">
    <div id="tripsTable"><div class="text-muted">Loading…</div></div>
  </div>
</div>

<!-- Trip Detail Modal -->
<div class="modal-overlay" id="tripModal">
  <div class="modal" style="width:min(640px,95vw)">
    <div class="modal-title">🗺️ Trip Detail</div>
    <div id="tripDetail"></div>

    <div id="locationSection" style="display:none;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div style="font-family:var(--mono);font-size:.72rem;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">
        📍 Vehicle Live Location
      </div>
      <div id="locationContent"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('tripModal')">Close</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadTrips() {
  const status = document.getElementById('filterStatus').value;
  const date   = document.getElementById('filterDate').value;
  let url = '/api/trips?';
  if (status) url += `status=${status}&`;
  if (date)   url += `date=${date}&`;
  document.getElementById('tripsTable').innerHTML = '<div class="text-muted">Loading…</div>';
  const trips = await apiFetch(url).catch(() => []);
  renderTrips(trips);
}

function renderTrips(data) {
  if (!data.length) {
    document.getElementById('tripsTable').innerHTML =
      '<div class="empty-state"><div class="empty-icon">◎</div><p>No trips found</p></div>';
    return;
  }
  document.getElementById('tripsTable').innerHTML = `
    <table>
      <thead><tr>
        <th>ID</th><th>Route</th><th>Date</th><th>Departure</th>
        <th>Driver</th><th>Vehicle</th><th>Seats</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>
        ${data.map(t => `<tr>
          <td class="mono" style="font-size:.78rem">#${t.TripID}</td>
          <td>${t.RouteName || (t.Source + ' → ' + t.Destination)}</td>
          <td class="mono" style="font-size:.78rem">${t.TripDate}</td>
          <td class="mono" style="font-size:.78rem">${t.ScheduledDepartureTime}</td>
          <td>${t.DriverName || '—'}</td>
          <td>${t.VehicleNumber || '—'}</td>
          <td>${t.AvailableSeats}/${t.TotalSeats}</td>
          <td>${statusTag(t.Status_)}</td>
          <td>
            <button class="btn btn-outline btn-sm"
                    onclick="viewTrip(${t.TripID}, ${t.VehicleID || 'null'})">👁</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function viewTrip(tripId, vehicleId) {
  document.getElementById('tripDetail').innerHTML = '<div class="text-muted">Loading…</div>';
  document.getElementById('locationSection').style.display = 'none';
  document.getElementById('locationContent').innerHTML = '';
  openModal('tripModal');

  const t = await apiFetch(`/api/trips/${tripId}`).catch(() => null);
  if (!t) {
    document.getElementById('tripDetail').innerHTML =
      '<div class="alert alert-error">Failed to load trip detail.</div>';
    return;
  }

  document.getElementById('tripDetail').innerHTML = `
    <div class="grid-2" style="gap:14px;font-size:.88rem">
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Route</div>
        <strong style="color:var(--cream)">${t.RouteName}</strong>
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Status</div>
        ${statusTag(t.Status_)}
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">From → To</div>
        ${t.Source} → ${t.Destination}
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Date</div>
        <span class="mono" style="font-size:.82rem">${t.TripDate}</span>
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Scheduled</div>
        <span class="mono" style="font-size:.78rem">${t.ScheduledDepartureTime} – ${t.ScheduledArrivalTime}</span>
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Actual</div>
        <span class="mono" style="font-size:.78rem">
          ${t.ActualDepartureTime || '—'} – ${t.ActualArrivalTime || '—'}
        </span>
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Driver</div>
        ${t.DriverName} <span class="text-muted">(⭐ ${t.DriverRating})</span>
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Vehicle</div>
        ${t.VehicleNumber} · ${t.Model} · ${t.Capacity} seats
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Available Seats</div>
        ${t.AvailableSeats} / ${t.TotalSeats}
      </div>
      <div>
        <div class="text-muted" style="font-size:.72rem;margin-bottom:3px">Base Fare</div>
        ₹${t.BaseFare}
      </div>
    </div>`;

  loadVehicleLocation(vehicleId || t.VehicleID, t.Status_);
}

async function loadVehicleLocation(vehicleId, tripStatus) {
  const section = document.getElementById('locationSection');
  const content = document.getElementById('locationContent');
  section.style.display = 'block';

  if (tripStatus === 'Cancelled') {
    content.innerHTML = '<div class="text-muted" style="font-size:.82rem">Location unavailable — trip was cancelled.</div>';
    return;
  }

  content.innerHTML = '<span class="spinner"></span>&nbsp;<span class="text-muted" style="font-size:.82rem">Fetching GPS…</span>';

  try {
    const loc = await apiFetch(`/api/vehicles/${vehicleId}/location`);
    const ago = timeSince(loc.Timestamp);
    content.innerHTML = `
      <div style="display:flex;flex-wrap:wrap;gap:16px;font-size:.85rem;margin-bottom:12px">
        <div>
          <div class="text-muted" style="font-size:.7rem;margin-bottom:4px">COORDINATES</div>
          <div class="gps-badge">
            <span class="dot"></span>
            ${Number(loc.Latitude).toFixed(6)}, ${Number(loc.Longitude).toFixed(6)}
          </div>
        </div>
        <div>
          <div class="text-muted" style="font-size:.7rem;margin-bottom:4px">SPEED</div>
          <div style="color:var(--cream);font-family:var(--mono)">
            ${loc.Speed != null ? loc.Speed + ' km/h' : '—'}
          </div>
        </div>
        <div>
          <div class="text-muted" style="font-size:.7rem;margin-bottom:4px">LAST UPDATED</div>
          <div style="color:var(--cream-dim);font-family:var(--mono);font-size:.78rem">${ago}</div>
        </div>
        <div>
          <div class="text-muted" style="font-size:.7rem;margin-bottom:4px">VEHICLE</div>
          <div style="color:var(--cream)">${loc.VehicleNumber} · ${loc.Model}</div>
        </div>
      </div>
      <a href="https://maps.google.com/?q=${loc.Latitude},${loc.Longitude}"
         target="_blank" rel="noopener"
         class="btn btn-outline btn-sm" style="font-size:.72rem">
        🗺 Open in Google Maps
      </a>`;
  } catch(e) {
    if (e.message.includes('Access denied')) {
      content.innerHTML = `<div class="text-muted" style="font-size:.82rem">
        Live location is available once you have a confirmed booking on this trip.</div>`;
    } else if (e.message.includes('No location')) {
      content.innerHTML = `<div class="text-muted" style="font-size:.82rem">
        No GPS data recorded for this vehicle yet.</div>`;
    } else {
      content.innerHTML = `<div class="text-muted" style="font-size:.82rem">
        Location unavailable: ${e.message}</div>`;
    }
  }
}

function timeSince(timestamp) {
  const diff = Math.floor((Date.now() - new Date(timestamp)) / 1000);
  if (diff < 60)    return `${diff}s ago`;
  if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return new Date(timestamp).toLocaleString();
}

function statusTag(s) {
  const m = {InProgress:'blue', Scheduled:'yellow', Completed:'green', Cancelled:'red'};
  return `<span class="tag tag-${m[s] || 'gray'}">${s}</span>`;
}

document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
loadTrips();
</script>
{% endblock %}
