{% extends "base.html" %}
{% block title %}Dashboard – ShuttleGo{% endblock %}

{% block content %}
<div class="topbar">
  <h1>⬡ Dashboard</h1>
  <span class="text-muted" style="font-family:var(--mono);font-size:.75rem">
    {{ username }} &nbsp;·&nbsp;
    <span class="text-orange">{{ role }}</span>
  </span>
</div>

<div class="content">
  <!-- Stats row — populated by JS based on role -->
  <div id="statsGrid" class="mb-6"></div>

  <!-- Role-specific content -->
  <div class="grid-2 mb-6">
    <div class="card">
      <div class="card-title">◎ Recent Trips</div>
      <div id="dashTrips"><div class="text-muted">Loading…</div></div>
    </div>
    <div class="card">
      <div class="card-title">◷ Recent Bookings</div>
      <div id="dashBookings"><div class="text-muted">Loading…</div></div>
    </div>
  </div>

  {% if role == 'admin' %}
  <div class="card">
    <div class="card-title">⚙ Quick Actions</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary"  onclick="location.href='/admin'">⚙ Control Panel</button>
      <button class="btn btn-outline"  onclick="location.href='/benchmark'">⚡ Run Benchmark</button>
      <button class="btn btn-outline"  onclick="location.href='/logs'">▤ Audit Logs</button>
      <button class="btn btn-outline"  onclick="location.href='/members'">◈ All Members</button>
    </div>
  </div>
  {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script>
const ROLE = '{{ role }}';

function statusTag(s) {
  const m = {InProgress:'blue',Scheduled:'yellow',Completed:'green',Cancelled:'red'};
  return `<span class="tag tag-${m[s]||'gray'}">${s}</span>`;
}
function bookingTag(s) {
  const m = {Confirmed:'green',Cancelled:'red',Completed:'blue',NoShow:'yellow'};
  return `<span class="tag tag-${m[s]||'gray'}">${s}</span>`;
}

function statCard(label, value, sub='') {
  return `<div class="stat-card">
    <div class="s-label">${label}</div>
    <div class="s-value">${value}</div>
    ${sub ? `<div class="s-sub">${sub}</div>` : ''}
  </div>`;
}

function tripsTable(trips) {
  if (!trips.length) return '<div class="empty-state"><div class="empty-icon">◎</div><p>No trips found</p></div>';
  return `<table><thead><tr><th>Route</th><th>Date</th><th>Status</th></tr></thead><tbody>
    ${trips.slice(0,6).map(t=>`<tr>
      <td>${t.RouteName||t.Source+' → '+t.Destination}</td>
      <td class="mono" style="font-size:.78rem">${t.TripDate}</td>
      <td>${statusTag(t.Status_)}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

function bookingsTable(bookings) {
  if (!bookings.length) return '<div class="empty-state"><div class="empty-icon">◷</div><p>No bookings found</p></div>';
  return `<table><thead><tr><th>ID</th><th>Route</th><th>Status</th></tr></thead><tbody>
    ${bookings.slice(0,6).map(b=>`<tr>
      <td class="mono" style="font-size:.78rem">#${b.BookingID}</td>
      <td>${b.RouteName||'—'}</td>
      <td>${bookingTag(b.BookingStatus)}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

(async () => {
  if (ROLE === 'admin') {
    const [trips, bookings, members] = await Promise.all([
      apiFetch('/api/trips').catch(()=>[]),
      apiFetch('/api/bookings').catch(()=>[]),
      apiFetch('/api/members').catch(()=>[]),
    ]);
    const confirmed = bookings.filter(b=>b.BookingStatus==='Confirmed').length;
    const today = new Date().toISOString().split('T')[0];
    const active = trips.filter(t=>t.TripDate===today && t.Status_==='InProgress').length;

    document.getElementById('statsGrid').innerHTML = `<div class="grid-4 mb-4">
      ${statCard('Total Members', members.length, 'all registered')}
      ${statCard('Active Trips Today', active, 'in progress')}
      ${statCard('Confirmed Bookings', confirmed, 'system-wide')}
      ${statCard('Total Trips', trips.length, 'all time')}
    </div>`;

    document.getElementById('dashTrips').innerHTML = tripsTable(trips.slice().reverse());
    document.getElementById('dashBookings').innerHTML = bookingsTable(bookings);

  } else if (ROLE === 'user') {
    // Could be passenger or driver — fetch what's available
    const [trips, bookings] = await Promise.all([
      apiFetch('/api/trips').catch(()=>[]),
      apiFetch('/api/bookings').catch(()=>[]),
    ]);

    const confirmed = bookings.filter(b=>b.BookingStatus==='Confirmed').length;
    const completed = bookings.filter(b=>b.BookingStatus==='Completed').length;

    document.getElementById('statsGrid').innerHTML = `<div class="grid-3 mb-4">
      ${statCard('Your Bookings', bookings.length, 'total')}
      ${statCard('Confirmed', confirmed, 'upcoming')}
      ${statCard('Completed', completed, 'past trips')}
    </div>`;

    document.getElementById('dashTrips').innerHTML = tripsTable(trips);
    document.getElementById('dashBookings').innerHTML = bookingsTable(bookings);
  }
})();
</script>
{% endblock %}
